# ============================================================
# render.yaml — Render cloud deployment configuration
#
# Render reads this file to know how to build and run
# the application on their cloud infrastructure.
# ============================================================

services:
  - type: web
    name: bizanalytics
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --chdir backend app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        value: bizanalytics-secret-key-2025
    rootDir: .