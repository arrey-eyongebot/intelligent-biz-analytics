<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BizAnalytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <!-- ── Auth Card ──────────────────────────────────────────
         Centered login form card shown on a gradient background -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand logo at top of auth card -->
            <div class="auth-brand">
                <i class="fas fa-chart-line"></i>
                <span>BizAnalytics</span>
            </div>

            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to access your dashboard</p>

            <!-- Error message box (hidden by default) -->
            <div class="auth-error" id="auth-error" style="display:none">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>

            <!-- Login Form -->
            <div class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            onkeypress="handleKeyPress(event)"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            onkeypress="handleKeyPress(event)"
                        >
                        <!-- Toggle password visibility -->
                        <i class="fas fa-eye toggle-password"
                           id="toggle-pw"
                           onclick="togglePassword()">
                        </i>
                    </div>
                </div>

                <!-- Login button -->
                <button class="btn-primary auth-btn" id="login-btn"
                        onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </div>

            <!-- Link to signup page -->
            <p class="auth-switch">
                Don't have an account?
                <a href="signup.html">Create one here</a>
            </p>

        </div>
    </div>

    <script>
    // ── API Base URL ──────────────────────────────────────────
    const API_BASE = 'https://bizanalytics-production-66f5.up.railway.app/api';
    
    // ── Check if Already Logged In ────────────────────────────
    // If user is already logged in, skip login page entirely
    window.onload = async () => {
        try {
            const res  = await fetch(`${API_BASE}/auth/status`,
                { credentials: 'include' });
            const data = await res.json();
            if (data.logged_in) {
                window.location.href = 'index.html';
            }
        } catch (e) { /* Backend not running yet — ignore */ }
    };

    // ── Handle Login Submission ───────────────────────────────
    async function handleLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn      = document.getElementById('login-btn');
        const errorBox = document.getElementById('auth-error');
        const errorTxt = document.getElementById('error-text');

        // Hide any previous error
        errorBox.style.display = 'none';

        // Basic validation
        if (!email || !password) {
            showError('Please enter your email and password.');
            return;
        }

        // Show loading state on button
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        btn.disabled  = true;

        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json' },
                credentials: 'include',  // Required for session cookies
                body:        JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                // Save user info to localStorage for navbar display
                localStorage.setItem('bizuser',
                    JSON.stringify(data.user));
                // Redirect to home page after login
                window.location.href = 'index.html';
            } else {
                showError(data.error);
            }

        } catch (err) {
            showError('Could not connect to server. Is the backend running?');
        }

        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        btn.disabled  = false;
    }

    // ── Show Error Message ────────────────────────────────────
    function showError(message) {
        const errorBox = document.getElementById('auth-error');
        document.getElementById('error-text').textContent = message;
        errorBox.style.display = 'flex';
    }

    // ── Toggle Password Visibility ────────────────────────────
    function togglePassword() {
        const input  = document.getElementById('password');
        const icon   = document.getElementById('toggle-pw');
        if (input.type === 'password') {
            input.type   = 'text';
            icon.className = 'fas fa-eye-slash toggle-password';
        } else {
            input.type   = 'password';
            icon.className = 'fas fa-eye toggle-password';
        }
    }

    // ── Submit on Enter Key ───────────────────────────────────
    function handleKeyPress(e) {
        if (e.key === 'Enter') handleLogin();
    }
    </script>

</body>
</html>
