<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — BizAnalytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand logo -->
            <div class="auth-brand">
                <i class="fas fa-chart-line"></i>
                <span>BizAnalytics</span>
            </div>

            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Start analyzing your business today</p>

            <!-- Error message box -->
            <div class="auth-error" id="auth-error" style="display:none">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>

            <!-- Success message box -->
            <div class="auth-success" id="auth-success" style="display:none">
                <i class="fas fa-check-circle"></i>
                <span id="success-text"></span>
            </div>

            <!-- Signup Form -->
            <div class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input
                            type="text"
                            id="name"
                            placeholder="e.g. Brian Arrey"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Password <span class="optional">(min 6 characters)</span></label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="Create a password"
                        >
                        <i class="fas fa-eye toggle-password"
                           id="toggle-pw"
                           onclick="togglePassword()">
                        </i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="confirm_password"
                            placeholder="Repeat your password"
                            onkeypress="handleKeyPress(event)"
                        >
                    </div>
                </div>

                <button class="btn-primary auth-btn" id="signup-btn"
                        onclick="handleSignup()">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </div>

            <!-- Link to login page -->
            <p class="auth-switch">
                Already have an account?
                <a href="login.html">Sign in here</a>
            </p>

        </div>
    </div>

    <script>
    const API_BASE = window.location.origin + '/api';
    
    // ── Handle Signup Submission ──────────────────────────────
    async function handleSignup() {
        const name             = document.getElementById('name').value.trim();
        const email            = document.getElementById('email').value.trim();
        const password         = document.getElementById('password').value.trim();
        const confirmPassword  = document.getElementById('confirm_password').value.trim();
        const btn              = document.getElementById('signup-btn');

        // Hide previous messages
        document.getElementById('auth-error').style.display   = 'none';
        document.getElementById('auth-success').style.display = 'none';

        // Validate fields
        if (!name || !email || !password || !confirmPassword) {
            showError('Please fill in all fields.');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        if (password !== confirmPassword) {
            showError('Passwords do not match.');
            return;
        }

        // Show loading state
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
        btn.disabled  = true;

        try {
            const res = await fetch(`${API_BASE}/auth/register`, {
                method:      'POST',
                headers:     { 'Content-Type': 'application/json' },
                credentials: 'include',
                body:        JSON.stringify({ name, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                // Save user info and redirect to home
                localStorage.setItem('bizuser',
                    JSON.stringify(data.user));
                showSuccess('Account created! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError(data.error);
            }

        } catch (err) {
            showError('Could not connect to server. Is the backend running?');
        }

        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        btn.disabled  = false;
    }

    // ── Show Error ────────────────────────────────────────────
    function showError(message) {
        const box = document.getElementById('auth-error');
        document.getElementById('error-text').textContent = message;
        box.style.display = 'flex';
    }

    // ── Show Success ──────────────────────────────────────────
    function showSuccess(message) {
        const box = document.getElementById('auth-success');
        document.getElementById('success-text').textContent = message;
        box.style.display = 'flex';
    }

    // ── Toggle Password Visibility ────────────────────────────
    function togglePassword() {
        const input = document.getElementById('password');
        const icon  = document.getElementById('toggle-pw');
        if (input.type === 'password') {
            input.type     = 'text';
            icon.className = 'fas fa-eye-slash toggle-password';
        } else {
            input.type     = 'password';
            icon.className = 'fas fa-eye toggle-password';
        }
    }

    // ── Submit on Enter Key ───────────────────────────────────
    function handleKeyPress(e) {
        if (e.key === 'Enter') handleSignup();
    }
    </script>

</body>
</html>
