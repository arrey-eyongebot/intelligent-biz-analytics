<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Sale — BizAnalytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-chart-line"></i>
            <span>BizAnalytics</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="predict.html">Predict</a>
            <a href="advisory.html">Advisory</a>
            <a href="transactions.html" class="active">Record Sale</a>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1><i class="fas fa-pen"></i> Record a Sale</h1>
        <p>Manually enter sales transactions — they will be included in your dashboard analysis</p>
    </div>

    <div class="transactions-wrapper">

        <!-- ── Transaction Entry Form ──────────────────────────
             Two-column layout form for entering transaction
             details. Required fields are marked with *.      -->
        <div class="form-container">
            <h3 style="margin-bottom:1.2rem">
                <i class="fas fa-plus-circle"></i> New Transaction
            </h3>

            <!-- Row 1: Customer Name and Sex -->
            <div class="form-row">
                <div class="form-group">
                    <label>
                        Customer Name
                        <span class="optional">(optional)</span>
                    </label>
                    <input type="text" id="customer_name"
                           placeholder="e.g. Ambe John">
                </div>
                <div class="form-group">
                    <label>
                        Sex
                        <span class="optional">(optional)</span>
                    </label>
                    <select id="sex">
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
            </div>

            <!-- Row 2: Product and Category -->
            <div class="form-row">
                <div class="form-group">
                    <label>
                        Product <span class="required">*</span>
                    </label>
                    <input type="text" id="product"
                           placeholder="e.g. Rice (5kg)">
                </div>
                <div class="form-group">
                    <label>
                        Category <span class="required">*</span>
                    </label>
                    <select id="category">
                        <option value="">Select category</option>
                        <option>Groceries</option>
                        <option>Electronics</option>
                        <option>Clothing</option>
                        <option>Stationery</option>
                        <option>Cosmetics</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <!-- Row 3: Quantity and Unit Price -->
            <div class="form-row">
                <div class="form-group">
                    <label>
                        Quantity <span class="required">*</span>
                    </label>
                    <input type="number" id="quantity"
                           placeholder="e.g. 3" min="1">
                </div>
                <div class="form-group">
                    <label>
                        Unit Price (FCFA) <span class="required">*</span>
                    </label>
                    <input type="number" id="unit_price"
                           placeholder="e.g. 3500">
                </div>
            </div>

            <!-- Row 4: Channel and Date -->
            <div class="form-row">
                <div class="form-group">
                    <label>
                        Sales Channel <span class="required">*</span>
                    </label>
                    <select id="channel">
                        <option value="">Select channel</option>
                        <option>Online</option>
                        <option>Onsite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        Date
                        <span class="optional">(optional, defaults to today)</span>
                    </label>
                    <input type="date" id="date">
                </div>
            </div>

            <!-- Auto-calculated total amount display -->
            <div class="total-display">
                Total Amount:
                <strong id="total-amount">0 FCFA</strong>
            </div>

            <!-- Save transaction button -->
            <button class="btn-primary" id="save-btn" style="width:100%">
                <i class="fas fa-save"></i> Save Transaction
            </button>

            <!-- Status message after save attempt -->
            <div id="form-status" style="margin-top:1rem"></div>
        </div>

        <!-- ── Transactions History Table ──────────────────────
             Displays all manually recorded transactions.
             Loaded by transactions.js on page open.          -->
        <div class="transactions-table-section">
            <div style="display:flex; justify-content:space-between;
                        align-items:center; margin-bottom:1rem">
                <h3><i class="fas fa-list"></i> Recorded Transactions</h3>
                <!-- Badge showing total record count -->
                <span id="total-count" class="badge">0 records</span>
            </div>
            <!-- Table injected here by transactions.js -->
            <div id="transactions-table">
                <div class="spinner"></div>
            </div>
        </div>

    </div>

    <footer class="footer">
        <p>Built by Brian Arrey — Computer Engineering &copy; 2025</p>
    </footer>

    <!-- Transaction recording logic -->
    <script src="js/transactions.js"></script>
</body>
</html>
