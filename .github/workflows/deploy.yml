# ============================================================
# deploy.yml — GitHub Actions CI/CD Pipeline
#
# Automatically runs tests and deploys to Render whenever
# code is pushed to the main branch on GitHub.
#
# Pipeline stages:
# 1. Checkout code
# 2. Set up Python
# 3. Install dependencies
# 4. Run basic health check
# 5. Trigger Render deployment
# ============================================================

name: Deploy BizAnalytics

on:
  push:
    branches: [ main ]  # Run on every push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install all dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Basic import check
      - name: Check app imports
        run: |
          cd backend
          python -c "import app; print('App imports OK')"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      # Step 5: Notify success
      - name: Deployment complete
        run: echo "BizAnalytics deployed successfully!"